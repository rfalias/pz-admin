<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PZ Admin</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css?v={{ static_version }}">
</head>
<body>
  <header>
    <h1>Project Zomboid Admin</h1>
    <nav>
      <a href="/server" class="{{ 'active' if active == 'server' else '' }}">Server</a>
      <a href="/sandbox" class="{{ 'active' if active == 'sandbox' else '' }}">Sandbox</a>
      <a href="/mods" class="{{ 'active' if active == 'mods' else '' }}">Mods</a>
      <a href="/logs" class="{{ 'active' if active == 'logs' else '' }}">Logs</a>
      <a href="/battlepass" class="{{ 'active' if active == 'battlepass' else '' }}">Battle Pass</a>
      <a href="/stats" class="{{ 'active' if active == 'stats' else '' }}">Players</a>
      <a href="/remote" class="{{ 'active' if active == 'remote' else '' }}">Remote Control</a>
      <a href="/settings" class="{{ 'active' if active == 'settings' else '' }}">Settings</a>
      <a href="/audit" class="{{ 'active' if active == 'audit' else '' }}">Audit Log</a>
    </nav>
    <div class="header-right">
      <span class="status-badge" id="status-badge" title="Checking...">
        <span class="status-dot"></span>
        <span class="status-text">checking...</span>
      </span>
      <form method="post" action="/rcon/save">
        <button type="submit" class="save-server-btn">Save World</button>
      </form>
      <form method="post" action="/restart"
            onsubmit="return confirm('Restart the {{ container }} container now? Players will be disconnected.');">
        <button type="submit" class="restart-btn">Restart Server</button>
      </form>
      <span class="user">{{ user }}</span>
      <a href="/logout">Logout</a>
    </div>
  </header>

  {% if flash %}
  <div class="flash">{{ flash }}</div>
  {% endif %}

  <main class="{{ 'main-wide' if active in ['stats', 'battlepass', 'audit'] else '' }}">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/filter.js?v={{ static_version }}" defer></script>
  <script src="/static/status.js?v={{ static_version }}" defer></script>
</body>
</html>
